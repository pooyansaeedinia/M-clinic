{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chat Templates{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'portal/styles.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body class="portal-body {% block body_class %}{% endblock %}">
    {% csrf_token %}
    {% block content %}{% endblock %}
    <div id="portal-toast-root" class="portal-toast-root" aria-live="polite" aria-atomic="true"></div>
    {% block extra_js %}{% endblock %}
</body>
</html>
